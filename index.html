<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>公款家用記帳系統</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const e = React.createElement;
    const generateUUID = () => Math.random().toString(36).substring(2, 15);
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";

    function App() {
      const [balance, setBalance] = useState(0);
      const [stagingList, setStagingList] = useState([]);
      const [cloudList, setCloudList] = useState([]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      useEffect(() => {
        fetch(WEB_APP_URL).then(res => res.json()).then(data => {
          if(data.success) {
            setBalance(data.balance);
            setCloudList(data.recentItems || []);
          }
        });
      }, []);

      const handleSubmit = async () => {
        if (stagingList.length === 0) return;
        setIsLoading(true);
        const now = new Date();
        const items = stagingList.map(d => ({ ...d, uuid: d.id, timestamp: now.getTime(), timestampStr: '剛剛' }));
        
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'add', items }) });
        setCloudList([...items, ...cloudList]);
        setStagingList([]);
        setIsLoading(false);
      };

      return e('div', { className: 'max-w-md mx-auto p-4' },
        e('div', { className: 'bg-blue-600 text-white p-6 rounded-xl shadow-lg mb-4' },
          e('p', { className: 'text-sm opacity-80' }, '目前結餘'),
          e('h1', { className: 'text-4xl font-black' }, `$${balance.toLocaleString()}`)
        ),
        e('div', { className: 'bg-white p-4 rounded-xl shadow mb-4 flex gap-2' },
          e('input', { className: 'border p-2 flex-1 rounded', placeholder: '項目', value: item, onChange: (ev) => setItem(ev.target.value) }),
          e('input', { className: 'border p-2 w-20 rounded', placeholder: '金額', type: 'number', value: amount, onChange: (ev) => setAmount(ev.target.value) }),
          e('button', { className: 'bg-green-500 text-white px-4 py-2 rounded', onClick: () => {
            setStagingList([...stagingList, { id: generateUUID(), item, amount: parseInt(amount) }]);
            setItem(''); setAmount('');
          }}, '加入')
        ),
        stagingList.length > 0 && e('button', { className: 'w-full bg-blue-500 text-white p-3 rounded mb-4 font-bold', onClick: handleSubmit }, '確認送出'),
        e('div', { className: 'bg-white rounded-xl p-4' },
          e('h3', { className: 'font-bold mb-2' }, '歷史紀錄'),
          cloudList.map(data => e('div', { key: data.uuid, className: 'flex justify-between border-b py-2' },
            e('span', null, data.item),
            e('span', { className: 'font-bold' }, `$${data.amount}`)
          ))
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
