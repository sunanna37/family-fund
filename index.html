<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>家用公款記帳系統</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;
    const e = React.createElement;
    const generateUUID = () => Math.random().toString(36).substring(2, 15);
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";

    function App() {
      const [balance, setBalance] = useState(0);
      const [totalIncome, setTotalIncome] = useState(0);
      const [totalExpense, setTotalExpense] = useState(0);
      const [stagingList, setStagingList] = useState([]);
      const [cloudList, setCloudList] = useState([]);
      
      // 表單狀態
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [type, setType] = useState('expense');
      const canvasRef = useRef(null);

      const refreshData = () => {
        fetch(WEB_APP_URL).then(res => res.json()).then(data => {
          if(data.success) {
            setBalance(data.balance);
            setTotalIncome(data.totalIncome);
            setTotalExpense(data.totalExpense);
            setCloudList(data.recentItems.map(i => ({...i, timestamp: new Date(i.timestamp).getTime() || 0})));
          }
        });
      };

      useEffect(() => { refreshData(); }, []);

      useEffect(() => {
        const ctx = canvasRef.current.getContext('2d');
        const p = Math.min(balance / 500000, 1);
        ctx.clearRect(0, 0, 200, 200);
        ctx.fillStyle = '#e2e8f0'; ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#2563eb'; ctx.fillRect(0, 200 - (200 * p), 200, 200 * p);
      }, [balance]);

      const handleSubmit = async () => {
        const items = stagingList.map(d => ({ ...d, uuid: d.id, timestamp: new Date().getTime() }));
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'add', items }) });
        setStagingList([]);
        refreshData();
      };

      return e('div', { className: 'max-w-md mx-auto p-4 pb-20' },
        e('div', { className: 'bg-blue-600 text-white p-6 rounded-b-3xl shadow-lg' },
          e('h1', { className: 'text-center font-bold mb-4' }, '公款家用結餘'),
          e('div', { className: 'flex justify-center mb-4' }, 
            e('canvas', { ref: canvasRef, width: 200, height: 200, className: 'rounded-xl border-4 border-white' })
          ),
          e('h1', { className: 'text-center text-3xl font-black' }, `$${balance.toLocaleString()}`)
        ),
        e('div', { className: 'bg-white p-4 rounded-xl mt-4 shadow' },
          e('div', { className: 'flex gap-2 mb-3' },
            e('button', { onClick: () => setType('expense'), className: `flex-1 py-1 rounded ${type === 'expense' ? 'bg-red-500 text-white' : 'bg-gray-100'}`}, '支出'),
            e('button', { onClick: () => setType('income'), className: `flex-1 py-1 rounded ${type === 'income' ? 'bg-green-500 text-white' : 'bg-gray-100'}`}, '收入')
          ),
          // 💡 新增：日期選擇器
          e('input', { type: 'date', className: 'w-full border p-2 mb-2 rounded', value: date, onChange: (ev) => setDate(ev.target.value) }),
          e('div', { className: 'flex gap-2' },
            e('input', { className: 'border p-2 flex-1 rounded', placeholder: '項目', value: item, onChange: (ev) => setItem(ev.target.value) }),
            e('input', { className: 'border p-2 w-20 rounded', placeholder: '金額', type: 'number', value: amount, onChange: (ev) => setAmount(ev.target.value) })
          ),
          e('button', { className: 'w-full bg-slate-800 text-white mt-3 py-2 rounded font-bold', onClick: () => {
            if(!item || !amount) return;
            setStagingList([...stagingList, { id: generateUUID(), date, item, amount: parseInt(amount), type }]);
            setItem(''); setAmount('');
          }}, '加入暫存')
        ),
        stagingList.length > 0 && e('button', { className: 'w-full bg-blue-500 text-white p-3 mt-4 rounded font-bold', onClick: handleSubmit }, '確認同步送出'),
        e('div', { className: 'bg-white rounded-xl p-4 mt-4' },
          e('h3', { className: 'font-bold mb-2' }, '雲端紀錄'),
          cloudList.map(data => e('div', { key: data.uuid, className: 'flex justify-between border-b py-2' },
            e('div', null, e('p', {className: 'text-xs text-gray-400'}, data.date), e('p', null, data.item)),
            e('span', { className: 'font-bold' }, (data.type === 'expense' ? '-' : '+') + '$' + data.amount)
          ))
        )
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
