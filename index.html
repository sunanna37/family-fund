<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>家用公款記帳系統</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;
    const e = React.createElement;
    const generateUUID = () => Math.random().toString(36).substring(2, 15);
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";

    function App() {
      const [balance, setBalance] = useState(0);
      const [totalIncome, setTotalIncome] = useState(0);
      const [totalExpense, setTotalExpense] = useState(0);
      const [stagingList, setStagingList] = useState([]);
      const [cloudList, setCloudList] = useState([]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [type, setType] = useState('expense');
      const [isLoading, setIsLoading] = useState(false);
      const canvasRef = useRef(null);

      // 載入資料
      useEffect(() => {
        fetch(WEB_APP_URL).then(res => res.json()).then(data => {
          if(data.success) {
            setBalance(data.balance);
            setTotalIncome(data.totalIncome);
            setTotalExpense(data.totalExpense);
            setCloudList(data.recentItems.map(i => ({...i, timestamp: new Date(i.timestamp).getTime() || 0})));
          }
        });
      }, []);

      // 繪製水位計 (Canvas)
      useEffect(() => {
        const ctx = canvasRef.current.getContext('2d');
        const p = Math.min(balance / 500000, 1);
        ctx.clearRect(0, 0, 240, 320);
        ctx.strokeRect(10, 10, 220, 300);
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(12, 310 - (300 * p), 216, 300 * p);
      }, [balance]);

      const handleSubmit = async () => {
        setIsLoading(true);
        const items = stagingList.map(d => ({ ...d, uuid: d.id, timestamp: new Date().getTime() }));
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'add', items }) });
        location.reload(); // 同步後重新整理
      };

      return e('div', { className: 'max-w-md mx-auto p-4' },
        // 儀表板
        e('div', { className: 'bg-blue-600 text-white p-6 rounded-b-3xl shadow-lg' },
          e('h1', { className: 'text-center font-bold mb-4' }, '公款家用結餘'),
          e('div', { className: 'flex justify-center mb-4' }, e('canvas', { ref: canvasRef, width: 240, height: 320, className: 'bg-white rounded-full w-24 h-24' })),
          e('h1', { className: 'text-center text-3xl font-black' }, `$${balance.toLocaleString()}`),
          e('div', { className: 'flex justify-between px-4 mt-4' },
            e('div', null, e('p', {className: 'text-xs'}, '存入'), e('p', {className: 'font-bold text-green-300'}, `+$${totalIncome}`)),
            e('div', null, e('p', {className: 'text-xs'}, '支出'), e('p', {className: 'font-bold text-red-300'}, `-$${totalExpense}`))
          )
        ),
        // 輸入區
        e('div', { className: 'bg-white p-4 rounded-xl mt-4' },
          e('div', { className: 'flex gap-2 mb-3' },
            e('button', { onClick: () => setType('expense'), className: `flex-1 py-1 rounded ${type === 'expense' ? 'bg-red-500 text-white' : 'bg-gray-100'}` }, '支出'),
            e('button', { onClick: () => setType('income'), className: `flex-1 py-1 rounded ${type === 'income' ? 'bg-green-500 text-white' : 'bg-gray-100'}` }, '收入')
          ),
          e('input', { className: 'w-full border p-2 mb-2 rounded', placeholder: '項目', value: item, onChange: (ev) => setItem(ev.target.value) }),
          e('input', { className: 'w-full border p-2 rounded', placeholder: '金額', type: 'number', value: amount, onChange: (ev) => setAmount(ev.target.value) }),
          e('button', { className: 'w-full bg-slate-800 text-white mt-3 py-2 rounded font-bold', onClick: () => {
            setStagingList([...stagingList, { id: generateUUID(), item, amount: parseInt(amount), type }]);
            setItem(''); setAmount('');
          }}, '加入暫存')
        ),
        // 同步按鈕
        stagingList.length > 0 && e('button', { className: 'w-full bg-blue-500 text-white p-3 mt-4 rounded font-bold', onClick: handleSubmit }, '確認同步送出'),
        // 紀錄
        e('div', { className: 'mt-4 bg-white p-4 rounded-xl' },
          cloudList.map(data => e('div', { key: data.uuid, className: 'flex justify-between border-b py-2' },
            e('span', null, data.item),
            e('span', { className: 'font-bold' }, (data.type === 'expense' ? '-' : '+') + '$' + data.amount)
          ))
        )
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
