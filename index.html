<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>家用公款記帳系統</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const e = React.createElement;
    const generateUUID = () => Math.random().toString(36).substring(2, 15);
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";

    function App() {
      const [balance, setBalance] = useState(0);
      const [stagingList, setStagingList] = useState([]);
      const [cloudList, setCloudList] = useState([]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [type, setType] = useState('expense');
      const [isLoading, setIsLoading] = useState(false);

      // 初始化讀取
      useEffect(() => {
        fetch(WEB_APP_URL).then(res => res.json()).then(data => {
          if(data.success) {
            setBalance(data.balance);
            setCloudList(data.recentItems.map(i => ({...i, timestamp: new Date(i.timestamp).getTime() || 0})));
          }
        });
      }, []);

      // 送出到後台 (同步功能)
      const handleSubmit = async () => {
        if(stagingList.length === 0) return;
        setIsLoading(true);
        const items = stagingList.map(d => ({ ...d, uuid: d.id, timestamp: new Date().getTime(), timestampStr: '剛剛' }));
        try {
          await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'add', items }) });
          setCloudList([...items, ...cloudList]);
          setStagingList([]);
          alert('同步成功！');
        } catch(e) { alert('同步失敗'); }
        setIsLoading(false);
      };

      // 撤回邏輯
      const handleRecall = async (uuid) => {
        setIsLoading(true);
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', uuid }) });
        setCloudList(cloudList.filter(d => d.uuid !== uuid));
        setIsLoading(false);
      };

      return e('div', { className: 'max-w-md mx-auto p-4 pb-20' },
        e('div', { className: 'bg-blue-600 text-white p-6 rounded-xl shadow-lg mb-4' },
          e('h1', {className: 'text-lg opacity-80'}, '當前結餘'),
          e('h1', { className: 'text-4xl font-black' }, `$${balance.toLocaleString()}`)
        ),
        e('div', { className: 'bg-white p-4 rounded-xl shadow mb-4' },
          e('div', { className: 'flex gap-2 mb-3' },
            e('button', { onClick: () => setType('expense'), className: `flex-1 py-1 rounded ${type === 'expense' ? 'bg-red-500 text-white' : 'bg-gray-100'}`}, '支出'),
            e('button', { onClick: () => setType('income'), className: `flex-1 py-1 rounded ${type === 'income' ? 'bg-green-500 text-white' : 'bg-gray-100'}`}, '收入')
          ),
          e('div', { className: 'flex gap-2' },
            e('input', { className: 'border p-2 flex-1 rounded', placeholder: '項目', value: item, onChange: (ev) => setItem(ev.target.value) }),
            e('input', { className: 'border p-2 w-20 rounded', placeholder: '金額', type: 'number', value: amount, onChange: (ev) => setAmount(ev.target.value) }),
            e('button', { className: 'bg-slate-800 text-white px-4 rounded font-bold', onClick: () => {
              if(!item || !amount) return;
              setStagingList([...stagingList, { id: generateUUID(), item, amount: parseInt(amount), type }]);
              setItem(''); setAmount('');
            }}, '加入')
          )
        ),
        stagingList.length > 0 && e('button', { className: 'w-full bg-blue-500 text-white p-3 rounded mb-4 font-bold animate-pulse', onClick: handleSubmit, disabled: isLoading }, '確認同步送出'),
        e('div', { className: 'bg-white rounded-xl p-4' },
          e('h3', { className: 'font-bold mb-2' }, '雲端紀錄'),
          cloudList.map(data => e('div', { key: data.uuid, className: 'flex justify-between border-b py-2' },
            e('span', null, data.item),
            e('div', {className: 'flex gap-2'},
              e('span', {className: 'font-bold'}, (data.type === 'expense' ? '-' : '+') + '$' + data.amount),
              e('button', { className: 'text-xs text-red-500', onClick: () => handleRecall(data.uuid) }, '撤回')
            )
          ))
        )
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
