<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>公款家用系統 v1.0</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const e = React.createElement;
    const generateUUID = () => Math.random().toString(36).substring(2, 15);
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";

    function App() {
      const [balance, setBalance] = useState(0);
      const [totalIncome, setTotalIncome] = useState(0);
      const [totalExpense, setTotalExpense] = useState(0);
      const [type, setType] = useState('expense');
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [stagingList, setStagingList] = useState([]);
      const [cloudList, setCloudList] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [isFetching, setIsFetching] = useState(true);

      useEffect(() => {
        fetch(WEB_APP_URL).then(res => res.json()).then(result => {
          if (result.success) {
            setBalance(result.balance || 0);
            setTotalIncome(result.totalIncome || 0);
            setTotalExpense(result.totalExpense || 0);
            const processedItems = (result.recentItems || []).map(i => ({...i, timestamp: new Date(i.timestamp).getTime() || 0}));
            setCloudList(processedItems);
          }
          setIsFetching(false);
        });
      }, []);

      const canRecall = (ts) => ts && (new Date().getTime() - ts) / 1000 / 60 <= 5;

      // 渲染主畫面
      return e('div', { className: 'max-w-md mx-auto bg-gray-50 min-h-screen pb-20 shadow-lg' },
        // 1. 水位計
        e('div', { className: 'bg-blue-600 text-white p-6 rounded-b-3xl shadow-md' },
          e('h1', { className: 'text-center text-lg font-bold mb-4' }, '公款家用結餘'),
          e('div', { className: 'flex justify-center mb-6' },
            e('div', { className: 'w-40 h-40 rounded-full border-4 border-blue-400 flex flex-col justify-center items-center bg-blue-700' },
              e('span', { className: 'text-sm opacity-80' }, '當前水位'),
              e('span', { className: 'text-3xl font-bold' }, `$${balance.toLocaleString()}`)
            )
          ),
          e('div', { className: 'flex justify-between px-4' },
            e('div', { className: 'text-center' }, e('p', {className: 'text-xs text-blue-200'}, '本期存入'), e('p', {className: 'text-lg font-semibold text-green-300'}, `+$${totalIncome.toLocaleString()}`)),
            e('div', { className: 'text-center' }, e('p', {className: 'text-xs text-blue-200'}, '本期支出'), e('p', {className: 'text-lg font-semibold text-red-300'}, `-$${totalExpense.toLocaleString()}`))
          )
        ),
        // 2. 輸入區 (簡單版)
        e('div', { className: 'p-4' },
          e('div', { className: 'bg-white rounded-xl shadow p-4 mb-4' },
            e('div', { className: 'flex bg-gray-100 rounded-lg p-1 mb-4' },
              e('button', { onClick: () => setType('expense'), className: `flex-1 py-2 rounded ${type === 'expense' ? 'bg-white text-red-500 shadow' : 'text-gray-500'}` }, '支出'),
              e('button', { onClick: () => setType('income'), className: `flex-1 py-2 rounded ${type === 'income' ? 'bg-white text-green-500 shadow' : 'text-gray-500'}` }, '收入')
            ),
            e('input', { type: 'date', className: 'w-full border p-2 mb-2 rounded', value: date, onChange: (ev) => setDate(ev.target.value) }),
            e('div', { className: 'flex gap-2' },
              e('input', { className: 'flex-1 border p-2 rounded', placeholder: '項目', value: item, onChange: (ev) => setItem(ev.target.value) }),
              e('input', { className: 'w-20 border p-2 rounded', type: 'number', placeholder: '金額', value: amount, onChange: (ev) => setAmount(ev.target.value) })
            ),
            e('button', { className: 'w-full bg-slate-800 text-white mt-3 py-2 rounded font-bold', onClick: () => {
              setStagingList([{ id: generateUUID(), date, item, type, amount: parseInt(amount) }, ...stagingList]);
              setItem(''); setAmount('');
            }}, '新增至暫存')
          ),
          // 3. 歷史紀錄列表
          e('div', { className: 'bg-white rounded-xl p-4' },
            cloudList.map(data => e('div', { key: data.uuid, className: 'flex justify-between border-b py-2' },
              e('div', null, e('p', {className: 'text-xs text-gray-400'}, data.date), e('p', null, data.item)),
              e('div', {className: 'flex items-center gap-2'}, 
                e('span', {className: `font-bold ${data.type === 'expense' ? 'text-red-500' : 'text-green-500'}`}, (data.type === 'expense' ? '-' : '+') + '$' + data.amount),
                canRecall(data.timestamp) ? e('button', { className: 'text-xs bg-gray-200 px-2 rounded', onClick: () => alert('請用 handleRecall 邏輯') }, '撤回') : null
              )
            ))
          )
        )
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
