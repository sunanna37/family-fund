<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>公款家用記帳系統 v2.0 - 雲端水情版</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 數字輸入框隱藏箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const e = React.createElement;
    const generateUUID = () => Math.random().toString(36).substring(2, 15);
    
    // 💡 請在此填入您的 GAS WEB APP URL
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";
    
    // 💡 水庫參數設定
    const MAX_CAPACITY = 500000; // 總容量 (滿水位)
    const WARNING_LIMIT = 100000; // 警告下限 (低水位紅線)

    function App() {
      const [balance, setBalance] = useState(0);
      const [totalIncome, setTotalIncome] = useState(0);
      const [totalExpense, setTotalExpense] = useState(0);
      const [stagingList, setStagingList] = useState([]);
      const [cloudList, setCloudList] = useState([]);
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [type, setType] = useState('expense');
      const [isLoading, setIsLoading] = useState(true);

      // --- 核心同步邏輯：從雲端重新抓取最新數據 ---
      const refreshDataFromServer = () => {
        setIsLoading(true);
        fetch(WEB_APP_URL).then(res => res.json()).then(data => {
          if(data.success) {
            setBalance(data.balance || 0);
            setTotalIncome(data.totalIncome || 0);
            setTotalExpense(data.totalExpense || 0);
            // 處理後台時間格式 (防 Nan 錯誤)
            const processed = (data.recentItems || []).map(i => ({...i, timestamp: new Date(i.timestamp).getTime() || 0}));
            setCloudList(processed);
          }
          setIsLoading(false);
        }).catch(err => {
          console.error('讀取失敗', err);
          setIsLoading(false);
        });
      };

      // 網頁初始載入同步一次
      useEffect(() => { refreshDataFromServer(); }, []);

      // 計算水位百分比與視覺參數
      const balancePercentage = Math.min(Math.max((balance / MAX_CAPACITY) * 100, 0), 100);
      const isLowWater = balance < WARNING_LIMIT;
      const warningLinePosition = (WARNING_LIMIT / MAX_CAPACITY) * 100;

      // --- 動作邏輯 ---
      const handleAddStaging = () => {
        if(!item || !amount || amount <= 0) return alert('請填寫完整項目與正確金額');
        setStagingList([{ id: generateUUID(), date, item, amount: parseInt(amount), type }, ...stagingList]);
        setItem(''); setAmount('');
      };

      const handleSubmit = async () => {
        if (stagingList.length === 0) return;
        setIsLoading(true);
        const now = new Date();
        const items = stagingList.map(d => ({ ...d, uuid: d.id, timestamp: now.getTime(), timestampStr: '剛剛' }));
        
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'add', items }) });
        alert(`成功同步 ${items.length} 筆資料至雲端！`);
        setStagingList([]);
        refreshDataFromServer(); // 送出後自動更新水位
      };

      const handleRecall = async (itemToRecall) => {
        if(!confirm(`確定要撤回「${itemToRecall.item}」嗎？此操作將永久刪除該筆雲端紀錄。`)) return;
        setIsLoading(true);
        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', uuid: itemToRecall.uuid }) });
        alert('撤回成功！');
        refreshDataFromServer(); // 撤回後自動更新水位
      };

      // --- 介面渲染結構 (Requirement 1 & 視覺優化) ---
      return e('div', { className: 'max-w-xl mx-auto p-4 pb-20' },
        isLoading && e('div', { className: 'fixed inset-0 bg-white/80 z-50 flex items-center justify-center font-bold text-blue-600 animate-pulse' }, '🔄 同步雲端資料中...'),
        
        // 1. 擬真水庫水情圖表 (Requirement 1)
        e('div', { className: 'bg-white p-6 rounded-3xl shadow-xl mb-4 border-2 border-blue-100' },
          e('h1', { className: 'text-center font-bold text-slate-600 mb-6 flex items-center justify-center gap-2' }, 
            e('span', { className: 'text-2xl' }, '💧'), '家用公款即時水情'
          ),
          
          e('div', { className: 'flex gap-6 items-start' },
            // 左側數值欄
            e('div', { className: 'flex-1 space-y-3 pt-2' },
              e('div', { className: 'text-left' }, e('p', {className: 'text-xs text-slate-400'}, '總容量 (滿水位)'), e('p', {className: 'text-sm font-bold'}, `$${MAX_CAPACITY.toLocaleString()}`)),
              e('div', { className: 'text-left border-l-4 border-rose-400 pl-2' }, e('p', {className: 'text-xs text-rose-500 font-medium'}, '低水位警告線'), e('p', {className: 'text-sm font-bold text-rose-600'}, `$${WARNING_LIMIT.toLocaleString()}`)),
              e('div', { className: 'text-left bg-blue-50 p-2 rounded-lg' }, e('p', {className: 'text-xs text-blue-500 font-medium'}, '當前蓄水量 (餘額)'), e('p', {className: 'text-3xl font-black text-blue-700 mt-1'}, `$${balance.toLocaleString()}`))
            ),
            
            // 右側視覺水位柱
            e('div', { className: 'w-24 flex flex-col items-center' },
              e('div', { className: 'relative w-16 h-48 bg-slate-200 rounded-lg overflow-hidden border-4 border-slate-300 shadow-inner' },
                // 紅色警告線
                e('div', { className: 'absolute left-0 right-0 h-1 bg-rose-500 z-10', style: { bottom: `${warningLinePosition}%` } }),
                // 藍色水位
                e('div', { className: 'absolute bottom-0 left-0 right-0 bg-blue-500 transition-all duration-500 ease-out', style: { height: `${balancePercentage}%` } }),
                // 波紋效果 (選配CSS)
                e('div', { className: 'absolute left-0 right-0 h-2 bg-blue-400 opacity-50', style: { bottom: `${balancePercentage - 1}%` } })
              ),
              e('p', { className: `mt-2 text-xl font-black ${isLowWater ? 'text-rose-600' : 'text-blue-600'}` }, `${balancePercentage.toFixed(1)}%`)
            )
          ),
          
          // 下方本期統計
          e('div', { className: 'flex justify-between px-4 mt-6 pt-4 border-t border-slate-100' },
            e('div', { className: 'text-center' }, e('p', {className: 'text-xs text-slate-400'}, '本期合計存入'), e('p', {className: 'text-xl font-bold text-emerald-600'}, `+$${totalIncome.toLocaleString()}`)),
            e('div', { className: 'text-center' }, e('p', {className: 'text-xs text-slate-400'}, '本期合計支出'), e('p', {className: 'text-xl font-bold text-rose-600'}, `-$${totalExpense.toLocaleString()}`))
          )
        ),

        // 2. 帳目輸入區 (不衝突穩定版)
        e('div', { className: 'bg-white p-5 rounded-2xl shadow-lg border' },
          e('div', { className: 'flex bg-slate-100 rounded-xl p-1 mb-4' },
            e('button', { onClick: () => setType('expense'), className: `flex-1 py-2 text-sm font-semibold rounded-lg transition-colors ${type === 'expense' ? 'bg-white text-rose-600 shadow' : 'text-slate-500'}` }, '支 出'),
            e('button', { onClick: () => setType('income'), className: `flex-1 py-2 text-sm font-semibold rounded-lg transition-colors ${type === 'income' ? 'bg-white text-emerald-600 shadow' : 'text-slate-500'}` }, '存 入')
          ),
          e('input', { type: 'date', className: 'w-full border border-slate-200 p-3 mb-3 rounded-xl bg-slate-50', value: date, onChange: (ev) => setDate(ev.target.value) }),
          e('div', { className: 'flex gap-2' },
            e('input', { className: 'flex-1 border border-slate-200 p-3 rounded-xl', placeholder: '項目名稱', value: item, onChange: (ev) => setItem(ev.target.value) }),
            e('input', { className: 'w-28 border border-slate-200 p-3 rounded-xl font-semibold', type: 'number', placeholder: '金額', value: amount, onChange: (ev) => setAmount(ev.target.value) })
          ),
          e('button', { className: 'w-full bg-slate-800 text-white mt-4 py-3 rounded-xl font-bold hover:bg-slate-700 transition active:scale-95', onClick: handleAddStaging }, '加入暫存清單')
        ),

        // 3. 暫存待送區 ( Requirement 2 )
        stagingList.length > 0 && e('div', { className: 'bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 mt-4 shadow-inner' },
          e('div', {className: 'flex justify-between items-center mb-3'}, 
            e('h3', { className: 'font-bold text-amber-900' }, `🛒 暫存待送出 (${stagingList.length}筆)`),
            e('button', { className: 'bg-blue-600 text-white text-sm px-4 py-2 rounded-lg font-bold animate-pulse', onClick: handleSubmit }, '確認同步送出')
          ),
          stagingList.map(d => e('div', { key: d.id, className: 'flex justify-between border-b border-amber-100 py-2 text-sm' },
            e('div', null, e('span', {className: `text-xs px-1.5 py-0.5 rounded mr-2 ${d.type==='income'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'}`},d.type==='income'?'存':'支'), e('span', {className: 'text-slate-700'}, d.item)),
            e('div', null, e('span', {className: 'font-bold text-slate-900 mr-2'}, `$${d.amount}`), e('button', {className:'text-rose-400 text-xs', onClick: ()=>setStagingList(stagingList.filter(s=>s.id!==d.id))}, '✖'))
          ))
        ),

        // 4. 近期雲端明細 (Requirement 3: 撤回功能)
        e('div', { className: 'bg-white rounded-2xl p-5 mt-4 border' },
          e('h3', { className: 'font-bold text-slate-600 mb-4' }, '📜 近期雲端存取紀錄 (最近10筆)'),
          cloudList.length === 0 ? e('p', {className: 'text-center text-slate-400 py-6 text-sm'}, '尚無紀錄，點擊上方送出資料') : 
          cloudList.map(data => e('div', { key: data.uuid, className: 'flex justify-between items-center border-b border-slate-100 py-3 text-sm' },
            e('div', null, e('p', {className: 'text-xs text-slate-400'}, `${data.date} ${data.timestampStr||''}`), e('p', {className:'font-medium text-slate-700 mt-1'}, data.item)),
            e('div', {className: 'flex items-center gap-2.5'}, 
              e('span', {className: `text-lg font-bold ${data.type === 'expense' ? 'text-rose-500' : 'text-emerald-500'}`}, (data.type === 'expense' ? '-' : '+') + '$' + data.amount.toLocaleString()),
              // 💡 撤回按鈕 (5分鐘防呆，重新整理後失效)
              canRecall(data.timestamp) ? e('button', { className: 'text-xs text-rose-500 bg-rose-50 px-2.5 py-1 rounded hover:bg-rose-100', onClick: () => handleRecall(data) }, '撤回') : null
            )
          ))
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
