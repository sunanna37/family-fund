<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>家用公款記帳系統</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;
    const e = React.createElement;

    function App() {
      const [balance, setBalance] = useState(448739);
      const [cart, setCart] = useState([]);
      const [history, setHistory] = useState([
        { uuid: '1', date: '2026-06-14', item: '素果', income: 0, expense: 480, status: 'Approved' }
      ]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      const [type, setType] = useState('expense');

      // 模擬新增到暫存區
      const handleAddToCart = (ev) => {
        ev.preventDefault();
        if (!item || !amount) return alert('請填寫完整');
        setCart([...cart, { id: Math.random().toString(36).substr(2, 9), item, amount: parseInt(amount), type, date: new Date().toISOString().split('T')[0] }]);
        setItem(''); setAmount('');
      };

      // 渲染主結構 (使用 React.createElement 取代 JSX)
      return e('div', { className: 'max-w-6xl mx-auto p-8' },
        e('header', { className: 'mb-8 border-b pb-4' },
          e('h1', { className: 'text-3xl font-black' }, '🏠 家用公款記帳系統'),
        ),
        e('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-8' },
          // 水位計區
          e('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border' }, 
            e('h2', { className: 'font-bold mb-4' }, '📊 公款帳戶水位'),
            e('div', { className: 'text-4xl font-black text-blue-600' }, `$${balance.toLocaleString()}`)
          ),
          // 輸入與清單區
          e('div', { className: 'lg:col-span-2 flex flex-col gap-6' },
            e('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border' },
              e('form', { onSubmit: handleAddToCart, className: 'flex gap-2' },
                e('input', { className: 'border p-2 rounded flex-1', placeholder: '項目', value: item, onChange: (ev) => setItem(ev.target.value) }),
                e('input', { className: 'border p-2 w-24 rounded', placeholder: '金額', type: 'number', value: amount, onChange: (ev) => setAmount(ev.target.value) }),
                e('button', { className: 'bg-slate-800 text-white px-6 rounded font-bold' }, '加入暫存')
              )
            ),
            // 購物車區
            e('div', { className: 'bg-amber-50 p-6 rounded-2xl' },
              e('h2', { className: 'font-bold mb-4' }, `🛒 待送出暫存清單 (${cart.length})`),
              cart.map(c => e('div', { key: c.id, className: 'flex justify-between border-b py-2' },
                e('span', null, c.item),
                e('span', { className: c.type === 'income' ? 'text-green-600' : 'text-red-600' }, c.type === 'income' ? '+' : '-', `$${c.amount}`)
              )),
              cart.length > 0 && e('button', { className: 'w-full bg-amber-600 text-white mt-4 py-2 rounded font-bold', onClick: () => alert('請連接您的 GAS URL') }, '確認送出')
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
