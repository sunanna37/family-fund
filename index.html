<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公款家用系統 v1.0</title>
  <!-- 引入 React, ReactDOM, Babel 進行前端渲染 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 引入 Tailwind CSS 美化介面 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
    /* 隱藏數字輸入框的上下箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>


  <script type="text/babel" data-type="module">
    
    const { useState, useEffect } = React;

    // 產生假 UUID 的函數
    const generateUUID = () => Math.random().toString(36).substring(2, 15);

    // 💰 填入妳的 GAS 網頁應用程式網址 (串接雲端大腦)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPq8xUK_XrDB_6ggsKE1jMXqNG-DIgFbVojtTcry03PAVErLD8O5-_xoNz_F3Q3d_Bvg/exec";

    function App() {
      // --- 狀態管理 (State) ---
      const [balance, setBalance] = useState(0); // 初始歸零，由第一筆「期初結餘」建立
      const [totalIncome, setTotalIncome] = useState(0);
      const [totalExpense, setTotalExpense] = useState(0);
      
      // 表單狀態
      const [type, setType] = useState('expense'); // 'income' 或 'expense'
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [item, setItem] = useState('');
      const [amount, setAmount] = useState('');
      
      // 暫存區 (準備送出的清單)
      const [stagingList, setStagingList] = useState([]);
      // 雲端資料區 (已送出的清單)
      const [cloudList, setCloudList] = useState([]);

      // 載入中狀態 (防止重複點擊與網路延遲防呆)
      const [isLoading, setIsLoading] = useState(false);
      // 新增：初始進入網頁的抓取狀態
      const [isFetching, setIsFetching] = useState(true);

      // --- 新增：網頁載入時自動抓取雲端資料 (The Magic Hook) ---
      useEffect(() => {
        const fetchInitialData = async () => {
          try {
            const response = await fetch(WEB_APP_URL);
            const result = await response.json();
            if (result.success) {
              setBalance(result.balance || 0);
              setTotalIncome(result.totalIncome || 0);
              setTotalExpense(result.totalExpense || 0);
              setCloudList(result.recentItems || []);
            }
          } catch (error) {
            console.error("網路連線錯誤，無法載入初始資料", error);
          } finally {
            setIsFetching(false); // 關閉同步動畫
          }
        };
        
        fetchInitialData();
      }, []); // 空陣列代表「只在網頁打開時執行一次」

      // --- 動作邏輯 (Actions) ---

      // 1. 加入暫存區
      const handleAddStaging = (e) => {
        e.preventDefault();
        if (!item || !amount) return alert("請填寫項目與金額！");
        
        const newItem = {
          id: generateUUID(),
          date,
          item,
          type,
          amount: parseInt(amount, 10)
        };
        
        setStagingList([newItem, ...stagingList]);
        setItem('');
        setAmount('');
      };

      // 2. 刪除暫存區項目
      const handleRemoveStaging = (id) => {
        setStagingList(stagingList.filter(data => data.id !== id));
      };

      // 3. 正式送出至雲端 (呼叫 GAS API)
      const handleSubmitToCloud = async () => {
        if (stagingList.length === 0) return;
        
        if (!confirm(`確定要送出這 ${stagingList.length} 筆資料嗎？\n送出後將寫入雲端。`)) return;

        setIsLoading(true); // 開啟載入動畫，鎖定按鈕

        // 加上 Timestamp，並移至 cloudList
        const now = new Date();
        const submittedItems = stagingList.map(data => ({
          ...data,
          uuid: data.id,
          timestamp: now.getTime(), // 存入毫秒以便計算撤回時間
          timestampStr: now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
          status: 'Pending'
        }));

        try {
          // 透過 fetch 打 POST 請求給妳的 GAS 網址
          const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'add',
              items: submittedItems
            })
          });
          
          const result = await response.json();

          if (result.success) {
            // 寫入成功，更新前端畫面
            setCloudList([...submittedItems, ...cloudList]);
            setStagingList([]); // 清空暫存區
            
            // 更新水位計餘額
            let currentIncome = 0;
            let currentExpense = 0;
            submittedItems.forEach(d => {
              if (d.type === 'income') currentIncome += d.amount;
              if (d.type === 'expense') currentExpense += d.amount;
            });
            
            setTotalIncome(prev => prev + currentIncome);
            setTotalExpense(prev => prev + currentExpense);
            setBalance(prev => prev + currentIncome - currentExpense);
            
            alert("成功送出至雲端！趕快去後台看看！");
          } else {
            alert("後台發生錯誤：" + result.message);
          }
        } catch (error) {
          alert("網路連線錯誤，請檢查網路或稍後再試。");
        } finally {
          setIsLoading(false); // 解除載入狀態
        }
      };

      // 4. 撤回功能 (5分鐘內)
      const handleRecall = async (uuid, dataTimestamp, dataType, dataAmount) => {
        const now = new Date().getTime();
        const diffInMinutes = (now - dataTimestamp) / 1000 / 60;
        
        if (diffInMinutes > 5) {
          alert("超過5分鐘，無法撤回！請聯繫管理員。");
          return;
        }

        if(confirm("確定要撤回這筆紀錄嗎？")){
           setIsLoading(true);

           try {
             // 傳送 delete 請求到雲端
             const response = await fetch(WEB_APP_URL, {
               method: 'POST',
               body: JSON.stringify({
                 action: 'delete',
                 uuid: uuid
               })
             });
             const result = await response.json();

             if (result.success) {
               // 模擬從雲端刪除
               setCloudList(cloudList.filter(data => data.uuid !== uuid));
               
               // 反向扣除水位
               if (dataType === 'income') {
                 setTotalIncome(prev => prev - dataAmount);
                 setBalance(prev => prev - dataAmount);
               } else {
                 setTotalExpense(prev => prev - dataAmount);
                 setBalance(prev => prev + dataAmount);
               }
               alert("撤回成功！帳目已從後台移除。");
             } else {
               alert("撤回失敗：" + result.message);
             }
           } catch(error) {
             alert("網路錯誤，無法撤回。");
           } finally {
             setIsLoading(false);
           }
        }
      };

      // 判斷是否可撤回 (時間差小於5分鐘)
      const canRecall = (timestamp) => {
        return (new Date().getTime() - timestamp) / 1000 / 60 <= 5;
      };

      return (
        <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-20 shadow-lg">
          {/* --- 1. 水位計儀表板 --- */}
          <div className="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md relative">
            {/* 新增：右上角同步中狀態提示 */}
            {isFetching && (
              <div className="absolute top-4 right-4 text-xs font-semibold text-blue-200 animate-pulse bg-blue-700 px-2 py-1 rounded-full">
                🔄 同步資料中...
              </div>
            )}
            
            <h1 className="text-center text-lg font-bold mb-4 opacity-90">公款家用結餘</h1>
            <div className="flex justify-center items-center mb-6">
              <div className="w-40 h-40 rounded-full border-4 border-blue-400 flex flex-col justify-center items-center bg-blue-700 shadow-inner relative overflow-hidden">
                <span className="text-sm opacity-80">當前水位</span>
                <span className="text-3xl font-bold tracking-wider">${balance.toLocaleString()}</span>
              </div>
            </div>
            <div className="flex justify-between px-4">
              <div className="text-center">
                <p className="text-xs text-blue-200">本期存入</p>
                <p className="text-lg font-semibold text-green-300">+${totalIncome.toLocaleString()}</p>
              </div>
              <div className="text-center">
                <p className="text-xs text-blue-200">本期支出</p>
                <p className="text-lg font-semibold text-red-300">-${totalExpense.toLocaleString()}</p>
              </div>
            </div>
          </div>

          <div className="p-4">
            {/* --- 2. 輸入區 --- */}
            <div className="bg-white rounded-xl shadow-sm p-4 mb-4 border border-gray-100">
              {/* 收支切換 */}
              <div className="flex bg-gray-100 rounded-lg p-1 mb-4">
                <button 
                  onClick={() => setType('expense')}
                  className={`flex-1 py-2 text-sm font-semibold rounded-md transition-colors ${type === 'expense' ? 'bg-white text-red-500 shadow' : 'text-gray-500'}`}
                >
                  支出
                </button>
                <button 
                  onClick={() => setType('income')}
                  className={`flex-1 py-2 text-sm font-semibold rounded-md transition-colors ${type === 'income' ? 'bg-white text-green-500 shadow' : 'text-gray-500'}`}
                >
                  收入
                </button>
              </div>

              {/* 輸入表單 */}
              <form onSubmit={handleAddStaging} className="space-y-3">
                <input 
                  type="date" 
                  value={date} onChange={e => setDate(e.target.value)}
                  className="w-full bg-gray-50 border border-gray-200 text-gray-700 rounded-lg p-3 outline-none focus:border-blue-400"
                />
                <div className="flex space-x-2">
                  <input 
                    type="text" placeholder="項目 (例: 全聯買菜)" 
                    value={item} onChange={e => setItem(e.target.value)}
                    className="flex-1 bg-gray-50 border border-gray-200 text-gray-700 rounded-lg p-3 outline-none focus:border-blue-400"
                  />
                  <input 
                    type="number" placeholder="金額" 
                    value={amount} onChange={e => setAmount(e.target.value)}
                    className="w-1/3 bg-gray-50 border border-gray-200 text-gray-700 rounded-lg p-3 outline-none focus:border-blue-400 font-semibold"
                  />
                </div>
                <button type="submit" className={`w-full py-3 rounded-lg text-white font-bold transition-colors ${type === 'expense' ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'}`}>
                  新增至清單
                </button>
              </form>
            </div>

            {/* --- 3. 暫存區 (待送出) --- */}
            {stagingList.length > 0 && (
              <div className="bg-yellow-50 rounded-xl shadow-sm p-4 mb-4 border border-yellow-200">
                <h3 className="text-sm font-bold text-yellow-800 mb-2">待送出清單 ({stagingList.length}筆)</h3>
                <div className="space-y-2 mb-4">
                  {stagingList.map(data => (
                    <div key={data.id} className="flex justify-between items-center bg-white p-2 rounded border border-yellow-100">
                      <div>
                        <span className={`text-xs px-2 py-1 rounded mr-2 ${data.type === 'expense' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                          {data.type === 'expense' ? '支' : '收'}
                        </span>
                        <span className="text-gray-700 font-medium">{data.item}</span>
                      </div>
                      <div className="flex items-center space-x-3">
                        <span className="font-bold text-gray-800">${data.amount}</span>
                        <button onClick={() => handleRemoveStaging(data.id)} className="text-red-400 hover:text-red-600">✖</button>
                      </div>
                    </div>
                  ))}
                </div>
                <button 
                  onClick={handleSubmitToCloud} 
                  disabled={isLoading}
                  className={`w-full font-bold py-3 rounded-lg shadow-md transition-colors ${isLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white animate-pulse'}`}
                >
                  {isLoading ? '資料傳送中...' : '確認寫入雲端'}
                </button>
              </div>
            )}

            {/* --- 4. 近期明細 (雲端資料) --- */}
            <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
              <h3 className="text-sm font-bold text-gray-600 mb-3">近期上傳紀錄 (最近10筆)</h3>
              {cloudList.length === 0 ? (
                <p className="text-gray-400 text-sm text-center py-4">尚無紀錄</p>
              ) : (
                <div className="space-y-3">
                  {cloudList.map(data => (
                    <div key={data.uuid} className="flex justify-between items-center p-3 border-b border-gray-50 bg-gray-50 rounded-lg">
                      <div className="flex flex-col">
                        <span className="text-xs text-gray-400">{data.date} {data.timestampStr}</span>
                        <span className="text-gray-700 font-medium">{data.item}</span>
                      </div>
                      <div className="flex items-center space-x-3">
                        <span className={`font-bold ${data.type === 'expense' ? 'text-red-500' : 'text-green-500'}`}>
                          {data.type === 'expense' ? '-' : '+'}${data.amount}
                        </span>
                        {/* 5分鐘內顯示撤回按鈕 */}
                        {canRecall(data.timestamp) ? (
                          <button 
                            onClick={() => handleRecall(data.uuid, data.timestamp, data.type, data.amount)}
                            disabled={isLoading}
                            className={`text-xs px-2 py-1 rounded transition-colors ${isLoading ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-200 text-gray-600 hover:bg-red-500 hover:text-white'}`}
                          >
                            撤回
                          </button>
                        ) : (
                          <span className="text-xs text-green-600 font-bold px-2 py-1">已存檔</span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
